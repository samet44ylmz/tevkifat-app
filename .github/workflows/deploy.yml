name: Deploy Tevkifat Module

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Tevkifat Modulunu Guncelle
        env:
          OC_SERVER: ${{ secrets.OC_SERVER }}
          OC_TOKEN: ${{ secrets.OC_TOKEN }}
        run: /home/prime/deploy_tevkifat.sh
